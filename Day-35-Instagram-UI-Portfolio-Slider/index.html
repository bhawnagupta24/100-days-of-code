<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
</head>

<body>
    <div id="main">
        <nav>
            <div id="left-nav">
                <div id="logo">
                    <img src="https://logos-world.net/wp-content/uploads/2020/06/Instagram-Logo.png" alt="">
                </div>
                <p>say__it__bhawna__</p>
            </div>
            <div id="center-nav">
                <a href="#">Home</a>
                <a href="#">Reels</a>
                <a href="#">Search</a>
                <a href="#">Messages</a>
                <a href="#">Notification</a>
            </div>
            <div id="right-nav">
                <button id="b1">My Profile</button>
            </div>
        </nav>
        <div id="heroSection">
            <div id="content">
                <div id="heading">
                    <h1>Bhawna Gupta</h1>
                    <p>Computer Science student with a growing interest in front-end development.
                        Focused on learning, consistency and building real-world projects</p>
                    <button id="b2">View</button>
                </div>
            </div>
            <div id="card-arrow">
                <div id="lft-arrow">
                    <i class="ri-arrow-left-long-line"></i>
                </div>
                <div id="cards">
                    <div class="swiper mySwiper">
                        <div class="swiper-wrapper">
                            <div class="swiper-slide">
                                <img src="./Assets/Profilephoto.png" alt="">
                            </div>
                            <div class="swiper-slide">
                                <img src=".//Assets/post.png" alt="">
                            </div>
                            <div class="swiper-slide">
                                <img src="./Assets/reels.png" alt="">
                            </div>
                            <div class="swiper-slide">
                                <img src="./Assets/feed.png" alt="">
                            </div>
                            <div class="swiper-slide">
                                <img src="./Assets/notifications.png" alt="">
                            </div>
                            <div class="swiper-slide">
                                <img src="./Assets/messages.png" alt="">
                            </div>
                            <div class="swiper-slide">
                                <img src="./Assets/image.png" alt="">
                            </div>
                        </div>
                    </div>
                </div>
                <div id="rgt-arrow">
                    <i class="ri-arrow-right-long-line"></i>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
