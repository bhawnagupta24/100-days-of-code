<!DOCTYPE html>

<body>
    <script>
        //8d solution

        function comparePrice(product1, product2) {
        if (product1.price < product2.price) {
          return product1;
        } else {
          return product2;
        }
      }

      const product1 = {
        name: 'basketball',
        price: 2095
      };

      const product2 = {
        name: 'socks',
        price: 1090
      };

      console.log(comparePrice(product1, product2));


      //8e solution

      function isSameProduct(product1, product2) {
        if (
          product1.name === product2.name &&
          product1.price === product2.price
        ) {
          return true;
        } else {
          return false;
        }
      }

      function isSameProduct(product1, product2) {
        return (
          product1.name === product2.name &&
          product1.price === product2.price
        );
      }

      const product3 = {
        name: 'basketball',
        price: 2095
      };

      const product4 = {
        name: 'socks',
        price: 1090
      };

      const product5 = {
        name: 'basketball',
        price: 2095
      };

      console.log(isSameProduct(product3, product4));
      console.log(isSameProduct(product3, product5));
    </script>
</body>
