<!DOCTYPE html>
<html>
  <head>
    <style>

    /* 10a solution */

      .amazon-button {
        background-color: rgb(255, 216, 20);
        border: none;
        padding: 5px 40px;
        border-radius: 20px;
        cursor: pointer;
      }


    /* 10b solution */
    
      .request-now-button {
        background-color: black;
        color: white;
        border: none;
        font-weight: bold;
        padding: 12px 20px;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 20px;
      }

      .schedule-later-button {
        background-color: rgb(230, 230, 230);
        border: none;
        font-weight: bold;
        padding: 12px 20px;
        border-radius: 5px;
        cursor: pointer;
      }

    </style>
  </head>
  <body>

    <!-- 10a solution -->

    <button class="amazon-button">
      Add to Cart
    </button>
   <br> <br>

    <!-- 10b solution -->

    <button class="request-now-button">
      Request now
    </button>
    <button class="schedule-later-button">
      Schedule for later
    </button>
  </body>
</html>
